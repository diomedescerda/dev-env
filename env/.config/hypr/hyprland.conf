monitor=eDP-1,1920x1080@60.00,0x0,1.25
# Syntax: monitor = name, resolution, position, scale, mirror, [target]
monitor = HDMI-A-1, preferred, auto, 1, mirror, eDP-1

$mod = SUPER

exec-once = awww-daemon
exec-once = wal -R -n
exec-once = ~/.local/bin/start-quickshell.sh
exec-once = swaync
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = mpd-mpris
exec-once = kdeconnect-indicator
exec-once = fcitx5 -d --replace

env = XMODIFIERS, @im=fcitx
env = GTK_IM_MODULE, fcitx
env = QT_IM_MODULE, fcitx
env = SDL_IM_MODULE, fcitx

general {
    gaps_in = 2
    gaps_out = 5
    border_size = 1
    col.active_border = rgb(585b70)
    col.inactive_border = rgb(2a2b36)
    layout = dwindle
    }

xwayland {
    force_zero_scaling = true
}

decoration {
    rounding = 16
    
    active_opacity = 1
    inactive_opacity = 0.8
    
    dim_inactive = true
    dim_strength = 0.04
    
    shadow {
        enabled = true
        range = 18
        render_power = 3
        color = rgba(00000040)
        offset = 0 6
    }
    
    blur {
        enabled = true
        size = 7
        passes = 3
        ignore_opacity = true
        new_optimizations = true
        special = true
        popups = true
        xray = false
    
        vibrancy = 0.1696
    }
}

animations {
    enabled = true

    bezier = bounce, 0.0, 1.25, 0.15, 1.0
    bezier = buttery, 0.1, 1.15, 0.15, 1.02
    bezier = smooth, 0.0, 0.0, 0.12, 1.0
    bezier = linear, 0.0, 0.0, 1.0, 1.0

    animation = windowsIn, 1, 4.5, bounce, slide
    animation = windowsOut, 1, 3.5, smooth, slide
    animation = windowsMove, 1, 4, buttery, slide

    animation = fadeIn, 1, 3.5, smooth
    animation = fadeOut, 1, 3, smooth
    animation = fadeDim, 1, 4, smooth
    animation = fadeShadow, 1, 4, smooth

    animation = workspaces, 1, 4.5, buttery, slidefade 10%    
    animation = specialWorkspace, 1, 4.5, buttery, slidefadevert -15%

    animation = border, 1, 7, smooth
    animation = borderangle, 1, 35, linear, loop

    animation = layersIn, 1, 4, bounce, slide
    animation = layersOut, 1, 3, smooth, slide
}

input {
    kb_layout = us
    kb_options = caps:escape
    follow_mouse = 0
    touchpad {
        natural_scroll = false
        disable_while_typing = true
    }
}

dwindle {
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    vrr = 1
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

cursor {
    inactive_timeout = 3
    no_warps = true
}

bind = $mod, Return, exec, kitty
bind = $mod SHIFT, RETURN, exec, [float; size 700 400] kitty
bind = $mod, M, exec, ~/.config/scripts/qs-toggle.sh launcher toggle
bind = $mod, T, exec, thunar
bind = $mod, W, killactive
bind = $mod SHIFT, space, togglefloating
bind = $mod SHIFT, W, exec, ~/.config/scripts/qs-toggle.sh wallpaper toggle
bind = $mod SHIFT, R, exec, ~/.config/scripts/random-wallpaper.sh
bind = $mod SHIFT, Q, exec, hyprlock
bind = $mod SHIFT, A, exec, ~/.config/scripts/qs-toggle.sh dashboard toggle
bind = $mod SHIFT, B, exec, ~/.config/scripts/qs-toggle.sh bluetooth toggle
bind = $mod SHIFT, D, exec, ~/.config/scripts/qs-toggle.sh music toggle
bind = $mod, D, exec, flatpak run com.discordapp.Discord
bind = $mod, F, fullscreen

bind = $mod, h, movefocus, l
bind = $mod, j, movefocus, d
bind = $mod, k, movefocus, u
bind = $mod, l, movefocus, r

bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, j, movewindow, d
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, l, movewindow, r

binde = $mod CTRL, h, resizeactive, -20 0
binde = $mod CTRL, l, resizeactive, 20 0
binde = $mod CTRL, k, resizeactive, 0 -20
binde = $mod CTRL, j, resizeactive, 0 20

bind = $mod, Tab, cyclenext
bind = $mod SHIFT, Tab, cyclenext, prev

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

#bind = $mod, P, pseudo
#bind = $mod, J, togglesplit

bind = $mod, V, exec, ~/.config/hypr/scripts/togglebar.sh
# Sound
bind = $mod, G, exec, pactl set-default-sink "alsa_output.pci-0000_00_1f.3.analog-stereo"
bind = $mod, H, exec, pactl set-default-sink "alsa_output.usb-Razer_Razer_Barracuda_X-00.analog-stereo"

bind = $mod, N, exec, swaync-client -t -sw
bind = $mod SHIFT, N, exec, swaync-client -C

bind = $mod, S, exec, grim ~/misc/screenshots/$(date +%Y-%m-%d_%H-%M-%S).png && notify-send "Screenshot Saved"
bind = $mod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy && notify-send "Screenshot Copied" "Selection copied to clipboard"

# Apps keybinds
bind = $mod, B, exec, zen-browser # Browser
bind = $mod, A, exec, anki # Anki
bind = $mod, O, exec, koodo-reader # Koodo Reader
bind = $mod, C, exec, code # VS Code

#Spotify
bind = $mod Ctrl, Space, exec, playerctl play-pause -p spotify
bind = $mod Ctrl, Right, exec, playerctl next -p spotify  
bind = $mod Ctrl, Left, exec, playerctl previous -p spotify

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

binde = , XF86AudioMute, exec, amixer set Master toggle
binde = , XF86AudioLowerVolume, exec, amixer set Master 5%-
binde = , XF86AudioRaiseVolume, exec, amixer set Master 5%+

windowrule = match:class Lorien, opacity 0.8 1
windowrule = match:class sublime_text, opacity 0.88 1
windowrule = match:class thunar, opacity 0.9 1
windowrule = match:class Thunar, opacity 0.9 1
windowrule = match:class VSCodium, opacity 0.88 1
windowrule = match:class codium, opacity 0.88 1
windowrule = match:class org.pwmt.zathura, opacity 0.9 1
windowrule = match:class firefox, opacity 1.0 1.0

windowrule = match:class mpv, float on
windowrule = match:class mpv, size 640 360
windowrule = match:class mpv, center on
windowrule = match:class mpv, opacity 1.0 1.0

windowrule = match:float yes, center on

windowrule = match:class scratchterm, float on
windowrule = match:class scratchterm, size 85% 70%
windowrule = match:class scratchterm, center on

layerrule = blur on, match:namespace waybar
#layerrule = ignore_alpha 0s, match:namespace waybar

layerrule = blur on, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window

layerrule = ignore_alpha 0, match:namespace swaync-control-center
layerrule = ignore_alpha 0, match:namespace swaync-notification-window

layerrule = blur on, match:namespace quickshell
layerrule = ignore_alpha 0, match:namespace quickshell
