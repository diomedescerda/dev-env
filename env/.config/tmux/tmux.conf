set -ga terminal-overrides ",*256col*:Tc"
set -g default-terminal "screen-256color"
set -s escape-time 0
set -g base-index 1
set -g status-style 'bg=default fg=white bold'
set -g status-position bottom
set -g status-justify absolute-centre
set -g status-left "#S"

# vi key movement for copy/pasta mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# i dont even use panes but anyways
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

bind r source-file $HOME/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"
bind-key S switch-client -l
